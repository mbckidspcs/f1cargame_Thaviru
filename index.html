<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Nitro Racer</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --bg-dark: #0a0a12;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: linear-gradient(to bottom, #1a1a2e, #0a0a12);
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px var(--neon-pink);
            pointer-events: none;
        }

        .screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--neon-pink);
            pointer-events: auto;
            max-width: 80%;
        }

        h1 { margin: 0 0 10px 0; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; }
        p { margin: 10px 0; }

        button {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .hidden { display: none !important; }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="hud" class="hud hidden">
                SCORE: <span id="score-val">0</span>
            </div>

            <!-- Start Screen -->
            <div id="start-screen" class="screen">
                <h1>Nitro Racer</h1>
                <p>Avoid the other cars!</p>
                <button id="start-btn">Start Race</button>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen hidden">
                <h1>WRECKED!</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Try Again</button>
            </div>

            <div id="controls-hint">Use ARROWS or TOUCH sides</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const finalScore = document.getElementById('final-score');
    
    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const hud = document.getElementById('hud');

    // Game Constants
    const ROAD_WIDTH = 300;
    const CAR_WIDTH = 40;
    const CAR_HEIGHT = 70;
    const LANE_COUNT = 3;

    // Game State
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let speed = 5;
    let player = { x: 0, y: 0, targetX: 0 };
    let enemies = [];
    let roadLines = [];
    let lastEnemyTime = 0;
    let animationId;

    // Initialization
    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        // Input Handling
        window.addEventListener('keydown', handleKeyDown);
        canvas.addEventListener('mousedown', handleTouch);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouch(e.touches[0]);
        });

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;
    }

    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        player.y = canvas.height - 100;
        player.x = canvas.width / 2 - CAR_WIDTH / 2;
        player.targetX = player.x;
    }

    function startGame() {
        gameState = 'PLAYING';
        score = 0;
        speed = 6;
        enemies = [];
        roadLines = [];
        
        // Create initial road lines
        for(let i = 0; i < 10; i++) {
            roadLines.push({ y: i * 100 });
        }

        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        
        gameLoop();
    }

    function handleKeyDown(e) {
        if (gameState !== 'PLAYING') return;
        const step = canvas.width / LANE_COUNT;
        if (e.key === 'ArrowLeft') player.targetX = Math.max(CAR_WIDTH/2, player.targetX - step);
        if (e.key === 'ArrowRight') player.targetX = Math.min(canvas.width - CAR_WIDTH*1.5, player.targetX + step);
    }

    function handleTouch(e) {
        if (gameState !== 'PLAYING') return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const step = canvas.width / LANE_COUNT;
        
        if (x < canvas.width / 2) {
            player.targetX = Math.max(0, player.targetX - step);
        } else {
            player.targetX = Math.min(canvas.width - CAR_WIDTH, player.targetX + step);
        }
    }

    function createEnemy() {
        const laneWidth = canvas.width / LANE_COUNT;
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const x = lane * laneWidth + (laneWidth - CAR_WIDTH) / 2;
        
        enemies.push({
            x: x,
            y: -CAR_HEIGHT,
            color: `hsl(${Math.random() * 360}, 70%, 60%)`
        });
    }

    function update() {
        // Smooth player movement
        player.x += (player.targetX - player.x) * 0.2;

        // Move road lines
        roadLines.forEach(line => {
            line.y += speed;
            if (line.y > canvas.height) line.y = -50;
        });

        // Spawn enemies
        const now = Date.now();
        if (now - lastEnemyTime > 2000 - (speed * 100)) {
            createEnemy();
            lastEnemyTime = now;
        }

        // Move enemies and check collisions
        for (let i = enemies.length - 1; i >= 0; i--) {
            let enemy = enemies[i];
            enemy.y += speed * 0.8;

            // Collision Detection
            if (
                player.x < enemy.x + CAR_WIDTH &&
                player.x + CAR_WIDTH > enemy.x &&
                player.y < enemy.y + CAR_HEIGHT &&
                player.y + CAR_HEIGHT > enemy.y
            ) {
                endGame();
            }

            // Score and cleanup
            if (enemy.y > canvas.height) {
                enemies.splice(i, 1);
                score++;
                scoreVal.innerText = score;
                // Increase difficulty
                if (score % 5 === 0) speed += 0.2;
            }
        }
    }

    function drawCar(x, y, color, isPlayer = false) {
        ctx.save();
        
        // Shadow
        ctx.shadowBlur = isPlayer ? 15 : 5;
        ctx.shadowColor = color;
        
        // Body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, CAR_WIDTH, CAR_HEIGHT, 5);
        ctx.fill();

        // Windshield
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(x + 5, y + 15, CAR_WIDTH - 10, 15);

        // Lights
        ctx.fillStyle = isPlayer ? 'white' : 'red';
        const lightY = isPlayer ? y : y + CAR_HEIGHT - 5;
        ctx.fillRect(x + 5, lightY, 8, 5);
        ctx.fillRect(x + CAR_WIDTH - 13, lightY, 8, 5);

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Road
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
        ctx.lineWidth = 2;
        
        // Lane dividers
        for(let i = 1; i < LANE_COUNT; i++) {
            const lx = (canvas.width / LANE_COUNT) * i;
            ctx.beginPath();
            ctx.setLineDash([20, 20]);
            ctx.moveTo(lx, 0);
            ctx.lineTo(lx, canvas.height);
            ctx.stroke();
        }

        // Animated road lines
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        roadLines.forEach(line => {
            ctx.fillRect(0, line.y, canvas.width, 2);
        });

        // Draw Enemies
        enemies.forEach(enemy => {
            drawCar(enemy.x, enemy.y, enemy.color);
        });

        // Draw Player
        drawCar(player.x, player.y, '#00f2ff', true);
    }

    function endGame() {
        gameState = 'GAMEOVER';
        cancelAnimationFrame(animationId);
        finalScore.innerText = score;
        gameOverScreen.classList.remove('hidden');
        hud.classList.add('hidden');
    }

    function gameLoop() {
        if (gameState !== 'PLAYING') return;
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    // Start everything
    window.onload = init;
</script>
</body>
</html>
