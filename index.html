<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed - Day Pursuit with Radar</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #111;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 10;
        }
        .stat { font-size: 24px; margin-bottom: 5px; font-weight: bold; }
        
        /* Mini-Map / Radar Styling */
        #radar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 200px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            z-index: 20;
        }
        #radar-player {
            position: absolute;
            left: 50%;
            bottom: 20px;
            width: 8px;
            height: 12px;
            background: #ff0000;
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 5px #ff0000;
        }
        .radar-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transform: translateX(-50%);
        }

        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border: 3px solid #ffaa00;
            box-shadow: 0 0 30px #ffaa00;
            border-radius: 20px;
            z-index: 100;
        }
        #alert {
            position: absolute;
            top: 100px;
            width: 100%;
            text-align: center;
            color: #ff0000;
            display: none;
            font-size: 35px;
            font-weight: bold;
            text-shadow: 0 0 10px white;
            z-index: 20;
        }
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        button {
            background: #ff5500;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #cc4400; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    
    <div id="ui">
        <div class="stat">SPEED: <span id="speed">0</span> KM/H</div>
        <div class="stat">SCORE: <span id="score">0</span></div>
    </div>

    <!-- Map/Radar UI -->
    <div id="radar">
        <div id="radar-player"></div>
        <div id="radar-dots"></div>
        <div style="position:absolute; bottom:2px; width:100%; text-align:center; color:#fff; font-size:10px; font-weight:bold;">RADAR</div>
    </div>
    
    <div id="alert">🚨 POLICE CHASING 🚨</div>

    <div id="msg">
        <h1 id="status-title" style="color: #ff5500; font-size: 50px;">BUSTED!</h1>
        <p style="font-size: 20px;">FINAL SCORE: <span id="final-score">0</span></p>
        <button onclick="resetGame()">RETRY ESCAPE</button>
    </div>

    <div id="controls-hint">W/A/S/D or Arrow Keys to Drive</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, playerCar;
        let road, obstacles = [], buildings = [], lanes = [-2.5, 0, 2.5];
        let speed = 0;
        let score = 0;
        let isGameOver = false;
        let moveLeft = false, moveRight = false, moveForward = false, moveBackward = false;
        let clock = new THREE.Clock();
        let exhaustFlames = [];
        
        let audioCtx, sirenOscillator, sirenGain;
        let isAudioStarted = false;

        function startAudio() {
            if (isAudioStarted) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sirenGain = audioCtx.createGain();
            sirenGain.gain.setValueAtTime(0, audioCtx.currentTime);
            sirenGain.connect(audioCtx.destination);
            isAudioStarted = true;
        }

        function playSirenEffect(active) {
            if (!isAudioStarted) return;
            if (active && !sirenOscillator) {
                sirenOscillator = audioCtx.createOscillator();
                sirenOscillator.type = 'square';
                sirenOscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                sirenOscillator.connect(sirenGain);
                sirenOscillator.start();
            } else if (!active && sirenOscillator) {
                sirenOscillator.stop();
                sirenOscillator.disconnect();
                sirenOscillator = null;
            }

            if (active) {
                const time = audioCtx.currentTime * 5;
                const freq = 440 + Math.sin(time) * 200;
                sirenOscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                sirenGain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1);
            } else {
                sirenGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
        }

        const CITY_SIZE = 2000;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 400);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            createRoad();
            createPlayerCar();
            
            for(let i = 0; i < 60; i++) {
                spawnBuilding(-i * 40);
            }

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', startAudio);

            animate();
        }

        function createRoad() {
            const geometry = new THREE.PlaneGeometry(12, CITY_SIZE * 2);
            const material = new THREE.MeshPhongMaterial({ color: 0x333333 });
            road = new THREE.Mesh(geometry, material);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -CITY_SIZE;
            scene.add(road);

            for(let i = 0; i < 400; i++) {
                const lineGeo = new THREE.PlaneGeometry(0.3, 5);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.05, -i * 15);
                scene.add(line);
            }
        }

        function createPlayerCar() {
            playerCar = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 100 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.4, 3.8), bodyMat);
            body.position.y = 0.5;
            playerCar.add(body);

            const stripeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const stripeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 3.8), stripeMat);
            stripeL.position.set(-0.3, 0.91, 0);
            playerCar.add(stripeL);
            const stripeR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 3.8), stripeMat);
            stripeR.position.set(0.3, 0.91, 0);
            playerCar.add(stripeR);

            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.45, 1.5), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            roof.position.set(0, 0.9, -0.2);
            playerCar.add(roof);

            const spoilerMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            const spoilerBaseL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), spoilerMat);
            spoilerBaseL.position.set(-0.6, 0.8, 1.6);
            playerCar.add(spoilerBaseL);
            const spoilerBaseR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), spoilerMat);
            spoilerBaseR.position.set(0.6, 0.8, 1.6);
            playerCar.add(spoilerBaseR);
            const spoilerTop = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.5), spoilerMat);
            spoilerTop.position.set(0, 1.0, 1.6);
            playerCar.add(spoilerTop);

            const flameGeo = new THREE.ConeGeometry(0.25, 1.2, 8);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.9 });
            const fPositions = [[-0.5, 0.3, 1.9], [0.5, 0.3, 1.9]];
            fPositions.forEach(pos => {
                const f = new THREE.Mesh(flameGeo, flameMat);
                f.position.set(...pos);
                f.rotation.x = Math.PI / 2;
                playerCar.add(f);
                exhaustFlames.push(f);
            });
            scene.add(playerCar);
        }

        function createNPCCar(color, isPolice) {
            const carGroup = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: isPolice ? 0x111111 : color });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 3.5), bodyMat);
            body.position.y = 0.5;
            carGroup.add(body);

            if (isPolice) {
                const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.5), new THREE.MeshPhongMaterial({ color: 0xffffff }));
                roof.position.set(0, 0.9, 0);
                carGroup.add(roof);
                const sirenL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.3), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                sirenL.position.set(-0.25, 1.1, 0);
                carGroup.add(sirenL);
                const sirenR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.3), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
                sirenR.position.set(0.25, 1.1, 0);
                carGroup.add(sirenR);
                const pLight = new THREE.PointLight(0xff0000, 2, 20);
                pLight.position.set(0, 2, 0);
                carGroup.add(pLight);
                carGroup.userData = { isPolice, sirenTimer: 0, sirenL, sirenR, pLight };
            }
            return carGroup;
        }

        function spawnBuilding(zPos) {
            const h = 20 + Math.random() * 60;
            const w = 10 + Math.random() * 15;
            const bMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 15), bMat);
            const side = Math.random() > 0.5 ? 1 : -1;
            b.position.set(side * (18 + w/2), h/2, zPos);
            scene.add(b);
            buildings.push(b);
        }

        function spawnObstacle() {
            if (isGameOver) return;
            const isPolice = Math.random() > 0.7;
            const colors = [0x5555ff, 0x444444, 0x00aa00, 0xffffff];
            const enemy = createNPCCar(colors[Math.floor(Math.random() * colors.length)], isPolice);
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            enemy.position.set(lane, 0, isPolice ? playerCar.position.z + 50 : playerCar.position.z - 200);
            scene.add(enemy);
            obstacles.push(enemy);
        }

        function updateRadar() {
            const radarDotsContainer = document.getElementById('radar-dots');
            radarDotsContainer.innerHTML = '';
            
            obstacles.forEach(obs => {
                const relX = obs.position.x;
                const relZ = obs.position.z - playerCar.position.z;

                // Only show dots within a certain range on radar
                if (Math.abs(relZ) < 150) {
                    const dot = document.createElement('div');
                    dot.className = 'radar-dot';
                    
                    // X position on radar (map lane to radar width)
                    const xPos = 75 + (relX * 12);
                    // Z position on radar (map distance to radar height)
                    const yPos = 180 + (relZ * 1.2); 
                    
                    dot.style.left = xPos + 'px';
                    dot.style.top = yPos + 'px';
                    dot.style.background = obs.userData.isPolice ? '#ff0000' : '#00ccff';
                    if(obs.userData.isPolice) dot.style.boxShadow = '0 0 5px #ff0000';
                    
                    radarDotsContainer.appendChild(dot);
                }
            });
        }

        function handleKeyDown(e) {
            startAudio();
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
            if (e.key === 'ArrowUp' || e.key === 'w') moveForward = true;
            if (e.key === 'ArrowDown' || e.key === 's') moveBackward = true;
        }

        function handleKeyUp(e) {
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
            if (e.key === 'ArrowUp' || e.key === 'w') moveForward = false;
            if (e.key === 'ArrowDown' || e.key === 's') moveBackward = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            speed = 0;
            playerCar.position.set(0, 0, 0);
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];
            document.getElementById('msg').style.display = 'none';
            document.getElementById('alert').style.display = 'none';
            playSirenEffect(false);
        }

        let obsTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) return;

            const delta = clock.getDelta();

            if (moveForward) speed = Math.min(speed + 3.5, 450); 
            else if (moveBackward) speed = Math.max(speed - 3.0, 0);
            else speed = Math.max(speed - 1.5, 0);

            if (moveLeft && playerCar.position.x > -4.5) playerCar.position.x -= 0.35;
            if (moveRight && playerCar.position.x < 4.5) playerCar.position.x += 0.35;

            playerCar.position.z -= (speed / 100);

            camera.position.z = playerCar.position.z + 28; 
            camera.position.y = 20;
            camera.position.x = playerCar.position.x * 0.5;
            camera.lookAt(playerCar.position.x, 0, playerCar.position.z - 50);

            exhaustFlames.forEach(f => {
                if (speed > 50) {
                    f.visible = true;
                    f.scale.y = 0.5 + Math.random() * (speed / 70);
                    f.material.color.set(Math.random() > 0.5 ? 0xffaa00 : 0xff5500);
                } else {
                    f.visible = false;
                }
            });

            document.getElementById('speed').innerText = Math.floor(speed);
            if (speed > 10) score += Math.floor(speed/10);
            document.getElementById('score').innerText = score;

            obsTimer += delta;
            if (obsTimer > (1.0 - (speed/800))) {
                spawnObstacle();
                obsTimer = 0;
            }

            if (buildings.length < 100) {
                const lastB = buildings[buildings.length - 1];
                spawnBuilding(lastB.position.z - 40);
            }

            let policeNearby = false;

            obstacles.forEach((obs, i) => {
                if (obs.userData.isPolice) {
                    const dist = Math.abs(playerCar.position.z - obs.position.z);
                    if (dist < 100) policeNearby = true;
                    
                    if (dist < 80) {
                        playSirenEffect(true);
                        const flashVal = Math.sin(Date.now() * 0.02);
                        document.getElementById('flash-overlay').style.opacity = Math.abs(flashVal) * 0.2;
                        document.getElementById('flash-overlay').style.background = flashVal > 0 ? 'red' : 'blue';
                    }

                    obs.position.z -= (speed / 100) + 0.08;
                    obs.position.x += (playerCar.position.x - obs.position.x) * 0.03;

                    obs.userData.sirenTimer += delta * 30;
                    const flash = Math.sin(obs.userData.sirenTimer) > 0;
                    obs.userData.sirenL.material.color.set(flash ? 0xff0000 : 0x330000);
                    obs.userData.sirenR.material.color.set(flash ? 0x000033 : 0x0000ff);
                    obs.userData.pLight.color.set(flash ? 0xff0000 : 0x0000ff);
                    
                    if (dist < 2.2 && Math.abs(playerCar.position.x - obs.position.x) < 1.7) gameOver();
                } else {
                    obs.position.z -= 0.8; 
                    if (Math.abs(playerCar.position.z - obs.position.z) < 4.0 && Math.abs(playerCar.position.x - obs.position.x) < 1.7) gameOver();
                }
                
                if (obs.position.z > playerCar.position.z + 100 || obs.position.z < playerCar.position.z - 300) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            });

            document.getElementById('alert').style.display = policeNearby ? 'block' : 'none';

            // Update Map/Radar UI
            updateRadar();

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            playSirenEffect(false);
            document.getElementById('final-score').innerText = score;
            document.getElementById('msg').style.display = 'block';
            document.getElementById('flash-overlay').style.opacity = '0';
        }

        window.onload = init;
    </script>
</body>
</html>
